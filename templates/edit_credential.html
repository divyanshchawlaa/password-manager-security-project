<!DOCTYPE html>
<html>
<head>
    <title>Edit Credential</title>
</head>

<body>

<h1>Edit Credential</h1>

<form method="POST">

    {{ form.hidden_tag() }}

    <p>
        {{ form.website.label }}
        {{ form.website() }}
    </p>

    <p>
        {{ form.username.label }}
        {{ form.username() }}
    </p>

    <p>
        {{ form.password.label }}
        {{ form.password() }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

</body>
</html>
