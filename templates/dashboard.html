{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-body p-5">

        <h2 class="mb-3">
            Welcome, {{ username }}
        </h2>

        <p class="text-muted mb-4">
            Securely manage your stored credentials and generate strong passwords.
        </p>

        <div class="d-grid gap-3">

            <a
                href="/add"
                class="btn btn-dark">

                Add Credential

            </a>

            <a
                href="/view"
                class="btn btn-outline-dark">

                View Credentials

            </a>

            <a
                href="/generate"
                class="btn btn-outline-secondary">

                Generate Password

            </a>

        </div>

    </div>

</div>

{% endblock %}
