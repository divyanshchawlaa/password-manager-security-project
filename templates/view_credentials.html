{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-body">

        <h2 class="mb-4">
            Stored Credentials
        </h2>

        <form
            method="GET"
            action="/view"
            class="mb-4">

            <div class="input-group">

                <input
                    type="text"
                    name="search"
                    class="form-control"
                    placeholder="Search website..."
                    value="{{ search }}">

                <button
                    class="btn btn-dark"
                    type="submit">

                    Search

                </button>

            </div>

        </form>

        <table class="table table-striped">

            <thead>

                <tr>

                    <th>Website</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Edit</th>
                    <th>Delete</th>

                </tr>

            </thead>

            <tbody>

                {% for credential in credentials %}

                <tr>

                    <td>{{ credential.website }}</td>

                    <td>{{ credential.username }}</td>

                    <td>{{ credential.password }}</td>

                    <td>

                        <a
                            href="/edit/{{ credential.id }}"
                            class="btn btn-outline-dark btn-sm">

                            Edit

                        </a>

                    </td>

                    <td>

                        <a
                            href="/delete/{{ credential.id }}"
                            class="btn btn-outline-danger btn-sm">

                            Delete

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
